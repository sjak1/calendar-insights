<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BriefingIQ API Tester</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: #1a1a1a;
            border-radius: 12px;
            border: 1px solid #2a2a2a;
            max-width: 800px;
            width: 100%;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: white;
            margin-bottom: 10px;
            font-size: 24px;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: #ccc;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 500;
        }

        input, textarea {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: #3a3a3a;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
            font-family: 'Courier New', monospace;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            background: #2a2a2a;
            color: white;
            border: 1px solid #3a3a3a;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover:not(:disabled) {
            background: #3a3a3a;
            border-color: #4a4a4a;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        button.primary {
            background: #2563eb;
            border-color: #3b82f6;
        }

        button.primary:hover:not(:disabled) {
            background: #3b82f6;
        }

        .examples {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }

        .example-btn {
            padding: 10px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 6px;
            color: #ccc;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
        }

        .example-btn:hover {
            background: #2a2a2a;
            border-color: #3a3a3a;
            color: white;
        }

        .response-section {
            margin-top: 20px;
        }

        .response-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .response-header h3 {
            color: white;
            font-size: 16px;
        }

        .status {
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status.success {
            background: #065f46;
            color: #10b981;
        }

        .status.error {
            background: #7f1d1d;
            color: #ef4444;
        }

        .status.loading {
            background: #1e3a8a;
            color: #3b82f6;
        }

        .response-box {
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 16px;
            color: #ccc;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            white-space: pre-wrap;
            word-wrap: break-word;
            max-height: 400px;
            overflow-y: auto;
        }

        .response-box::-webkit-scrollbar {
            width: 8px;
        }

        .response-box::-webkit-scrollbar-track {
            background: #0f0f0f;
        }

        .response-box::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }

        .loading-dots {
            display: inline-flex;
            gap: 4px;
        }

        .loading-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #3b82f6;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .info-box {
            background: #1e3a8a;
            border: 1px solid #2563eb;
            border-radius: 8px;
            padding: 12px;
            color: #93c5fd;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .info-box strong {
            color: #60a5fa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 BriefingIQ API Tester</h1>
        <p class="subtitle">Test your AI endpoint at https://ai.briefingiq.com/process_query</p>

        <div class="info-box">
            <strong>💡 Tip:</strong> Click an example below or type your own query!
        </div>

        <div class="examples">
            <button class="example-btn" onclick="setQuery('Show me all presenters')">
                👥 Show all presenters
            </button>
            <button class="example-btn" onclick="setQuery('What locations are available?')">
                📍 Get locations
            </button>
            <button class="example-btn" onclick="setQuery('Schedule a meeting on 2025-12-01 from 10:00 to 11:00')">
                📅 Schedule meeting
            </button>
            <button class="example-btn" onclick="setQuery('What is the GDP of USA in 2024?')">
                💰 Get GDP data
            </button>
        </div>

        <div class="input-group">
            <label for="queryInput">Query</label>
            <input 
                type="text" 
                id="queryInput" 
                placeholder="Enter your query here..."
                value="Show me all presenters"
            >
        </div>

        <div class="input-group">
            <label for="headersInput">Headers (JSON) - Optional</label>
            <textarea 
                id="headersInput" 
                placeholder='{}'
            >{}</textarea>
        </div>

        <div class="button-group">
            <button class="primary" onclick="sendRequest()" id="sendBtn">
                Send Request
            </button>
            <button onclick="clearResponse()">
                Clear Response
            </button>
        </div>

        <div class="response-section" id="responseSection" style="display: none;">
            <div class="response-header">
                <h3>Response</h3>
                <span class="status" id="statusBadge">Success</span>
            </div>
            <div class="response-box" id="responseBox"></div>
        </div>
    </div>

    <script>
        const API_URL = 'https://wszdhlbr6jnc3dyff5wvjex2li0pgzmv.lambda-url.us-west-2.on.aws/process_query';

        function setQuery(query) {
            document.getElementById('queryInput').value = query;
        }

        function clearResponse() {
            document.getElementById('responseSection').style.display = 'none';
            document.getElementById('responseBox').textContent = '';
        }

        async function sendRequest() {
            const queryInput = document.getElementById('queryInput');
            const headersInput = document.getElementById('headersInput');
            const sendBtn = document.getElementById('sendBtn');
            const responseSection = document.getElementById('responseSection');
            const responseBox = document.getElementById('responseBox');
            const statusBadge = document.getElementById('statusBadge');

            const query = queryInput.value.trim();
            if (!query) {
                alert('Please enter a query!');
                return;
            }

            // Parse headers
            let headers = {};
            try {
                headers = JSON.parse(headersInput.value || '{}');
            } catch (e) {
                alert('Invalid JSON in headers field!');
                return;
            }

            // Show loading state
            responseSection.style.display = 'block';
            statusBadge.className = 'status loading';
            statusBadge.innerHTML = 'Loading <div class="loading-dots"><span></span><span></span><span></span></div>';
            responseBox.textContent = 'Sending request...';
            sendBtn.disabled = true;

            try {
                const startTime = Date.now();
                
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        query: query,
                        headers: headers
                    })
                });

                const endTime = Date.now();
                const duration = endTime - startTime;

                const data = await response.json();

                // Show success
                statusBadge.className = 'status success';
                statusBadge.textContent = `Success (${duration}ms)`;
                
                responseBox.textContent = JSON.stringify(data, null, 2);

            } catch (error) {
                // Show error
                statusBadge.className = 'status error';
                statusBadge.textContent = 'Error';
                
                responseBox.textContent = `Error: ${error.message}\n\nThis might be a CORS issue. Make sure:\n1. CORS middleware is added to api.py\n2. Lambda code is redeployed\n3. Lambda Function URL CORS is configured`;
            } finally {
                sendBtn.disabled = false;
            }
        }

        // Allow Enter key to submit
        document.getElementById('queryInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendRequest();
            }
        });

        // Auto-format JSON in headers field
        document.getElementById('headersInput').addEventListener('blur', function() {
            try {
                const parsed = JSON.parse(this.value || '{}');
                this.value = JSON.stringify(parsed, null, 2);
            } catch (e) {
                // Keep as is if invalid
            }
        });
    </script>
</body>
</html>
